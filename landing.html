<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="index, follow">
<title>Nitid — Escáner de documentos privado</title>
<meta name="description" content="Nitid is a private, local-first document scanner. Digitize, organize and export to PDF with no cloud required. / Nitid es un escáner de documentos local-first: digitaliza y exporta a PDF sin nube obligatoria.">
<meta property="og:title" content="Nitid — Private document scanner">
<meta property="og:description" content="Local-first document scanner. Your documents stay on your device.">
<meta property="og:type" content="website">
<style>
  :root{
    --bg:#0B0B0E; --bg2:#13131a; --card:#171a21; --fg:#f1f2f6; --muted:#9aa1ad;
    --accent:#4c8dff; --accent2:#7b5cff; --border:#262b35; --maxw:980px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%; scroll-behavior:smooth}
  body{margin:0; background:radial-gradient(1200px 600px at 50% -10%,#1b1f2e 0%,var(--bg) 55%); color:var(--fg);
    font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 20px}
  nav{display:flex; align-items:center; justify-content:space-between; padding:22px 0; flex-wrap:wrap; gap:12px}
  .brand{display:flex; align-items:center; gap:12px}
  .logo{width:42px; height:42px; border-radius:11px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:20px}
  .brand b{font-size:18px}
  .navlinks{display:flex; gap:18px; align-items:center; font-size:14px}
  .navlinks a{color:var(--muted); text-decoration:none}
  .navlinks a:hover{color:var(--fg)}
  .toggle{display:inline-flex; border:1px solid var(--border); border-radius:999px; overflow:hidden}
  .toggle button{appearance:none; border:0; background:transparent; color:var(--muted); padding:6px 13px; font-size:13px; font-weight:600; cursor:pointer}
  .toggle button.active{background:var(--accent); color:#fff}

  .hero{text-align:center; padding:54px 0 36px}
  .pill{display:inline-block; font-size:12px; letter-spacing:.04em; text-transform:uppercase; color:var(--accent); border:1px solid var(--border); border-radius:999px; padding:6px 14px; margin-bottom:20px}
  .hero h1{font-size:clamp(30px,6vw,52px); line-height:1.08; margin:0 0 16px; letter-spacing:-.02em}
  .hero p.lead{font-size:clamp(16px,2.4vw,20px); color:var(--muted); max-width:620px; margin:0 auto 26px}
  .cta{display:inline-flex; gap:12px; flex-wrap:wrap; justify-content:center}
  .btn{display:inline-block; padding:12px 22px; border-radius:12px; font-weight:700; text-decoration:none; font-size:15px}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff}
  .btn.ghost{border:1px solid var(--border); color:var(--fg)}

  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; padding:18px 0 8px}
  .feature{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px}
  .feature .ic{font-size:22px; margin-bottom:8px}
  .feature h3{margin:0 0 6px; font-size:16px}
  .feature p{margin:0; color:var(--muted); font-size:14px}

  .privacy{margin:34px 0; background:linear-gradient(135deg,rgba(76,141,255,.10),rgba(123,92,255,.10)); border:1px solid var(--border); border-radius:18px; padding:30px; text-align:center}
  .privacy h2{margin:0 0 8px; font-size:24px}
  .privacy p{margin:0 auto; color:var(--muted); max-width:560px}

  footer{border-top:1px solid var(--border); margin-top:40px; padding:26px 0 50px; color:var(--muted); font-size:13px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px}
  footer a{color:var(--muted)}
  [hidden]{display:none !important}
  [data-es],[data-en]{}
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <div class="brand"><div class="logo">N</div><b>Nitid</b></div>
    <div class="navlinks">
      <a href="#features" data-es="Funciones" data-en="Features"></a>
      <a href="./support.html" data-es="Soporte" data-en="Support"></a>
      <a href="./index.html" data-es="Privacidad" data-en="Privacy"></a>
      <span class="toggle" role="group" aria-label="Language">
        <button id="btn-es" class="active" type="button">ES</button>
        <button id="btn-en" type="button">EN</button>
      </span>
    </div>
  </nav>

  <section class="hero">
    <span class="pill" data-es="Local-first · Sin nube obligatoria" data-en="Local-first · No cloud required"></span>
    <h1 data-es="Tu escáner de documentos privado" data-en="Your private document scanner"></h1>
    <p class="lead" data-es="Digitaliza contratos, recibos, notas y cualquier papel desde tu teléfono. Todo se queda en tu dispositivo." data-en="Digitize contracts, receipts, notes and any paper from your phone. Everything stays on your device."></p>
    <div class="cta">
      <a class="btn primary" href="./support.html" data-es="Cómo empezar" data-en="Get started"></a>
      <a class="btn ghost" href="#features" data-es="Ver funciones" data-en="See features"></a>
    </div>
  </section>

  <section id="features" class="grid">
    <div class="feature"><div class="ic">🔒</div><h3 data-es="Local-first de verdad" data-en="Truly local-first"></h3><p data-es="Tus documentos y su texto se guardan solo en tu dispositivo. Sin sincronización silenciosa." data-en="Your documents and their text are stored only on your device. No silent sync."></p></div>
    <div class="feature"><div class="ic">☁️</div><h3 data-es="Sin nube obligatoria" data-en="No forced cloud"></h3><p data-es="Nada se sube automáticamente a ningún servidor." data-en="Nothing is uploaded automatically to any server."></p></div>
    <div class="feature"><div class="ic">⚡</div><h3 data-es="Escaneo rápido" data-en="Fast scanning"></h3><p data-es="Captura con la cámara o importa desde tu galería en un toque." data-en="Capture with the camera or import from your library in one tap."></p></div>
    <div class="feature"><div class="ic">📁</div><h3 data-es="Organiza a tu manera" data-en="Organize your way"></h3><p data-es="Carpetas, favoritos y búsqueda por título o carpeta." data-en="Folders, favorites and search by title or folder."></p></div>
    <div class="feature"><div class="ic">✂️</div><h3 data-es="Edita con calidad" data-en="Edit with quality"></h3><p data-es="Reordena y elimina páginas, rota y aplica filtros de nitidez." data-en="Reorder and delete pages, rotate and apply sharpening filters."></p></div>
    <div class="feature"><div class="ic">📤</div><h3 data-es="Exporta cuando tú decides" data-en="Export when you decide"></h3><p data-es="Guarda un PDF local o compártelo por el menú del sistema." data-en="Save a local PDF or share it via the system menu."></p></div>
  </section>

  <section class="privacy">
    <h2 data-es="Tu privacidad no es una opción de pago" data-en="Your privacy is not a paid feature"></h2>
    <p data-es="Sin anuncios ni rastreo: no analizamos tus archivos para publicidad. La privacidad es el punto de partida, no un extra." data-en="No ads, no tracking: we don't analyze your files for advertising. Privacy is the starting point, not an add-on."></p>
  </section>

  <footer>
    <span>© 2026 Nitid</span>
    <span>
      <a href="./index.html" data-es="Política de privacidad" data-en="Privacy Policy"></a> ·
      <a href="./support.html" data-es="Soporte" data-en="Support"></a> ·
      <a href="mailto:junsae.co@gmail.com">junsae.co@gmail.com</a>
    </span>
  </footer>
</div>

<script>
(function(){
  var bEs=document.getElementById('btn-es'), bEn=document.getElementById('btn-en');
  function set(lang){
    var isEs = lang==='es';
    bEs.classList.toggle('active',isEs); bEn.classList.toggle('active',!isEs);
    document.documentElement.lang=lang;
    document.querySelectorAll('[data-es]').forEach(function(n){
      var v = isEs ? n.getAttribute('data-es') : n.getAttribute('data-en');
      if(v!==null) n.textContent = v;
    });
    try{ location.hash = isEs ? '' : 'en'; }catch(e){}
  }
  bEs.addEventListener('click',function(){set('es')});
  bEn.addEventListener('click',function(){set('en')});
  var initial = (location.hash.replace('#','')==='en') ? 'en'
              : ((navigator.language||'es').slice(0,2)==='en' ? 'en' : 'es');
  set(initial);
})();
</script>
</body>
</html>
